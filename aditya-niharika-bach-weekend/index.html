<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="theme-color" content="#18212b" />
    <title>Aditya &amp; Niharika's Bach Weekend</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --paper: #fffaf2;
        --ink: #1c1915;
        --muted: #71665b;
        --night: #18212b;
        --coral: #d45d3d;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(120deg, rgba(24, 33, 43, 0.9), rgba(24, 33, 43, 0.62)),
          radial-gradient(circle at 78% 22%, rgba(212, 93, 61, 0.24), transparent 34%),
          var(--night);
        color: var(--paper);
      }
      main {
        width: min(520px, 100%);
        padding: 28px;
        border: 1px solid rgba(255, 250, 242, 0.2);
        border-radius: 8px;
        background: rgba(24, 33, 43, 0.74);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(16px);
      }
      .brand {
        width: 58px;
        height: 44px;
        display: inline-grid;
        place-items: center;
        margin-bottom: 22px;
        border-radius: 6px;
        background: rgba(255, 250, 242, 0.13);
        font-weight: 900;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.25rem, 8vw, 4.4rem);
        line-height: 0.94;
        letter-spacing: 0;
      }
      p {
        margin: 0 0 18px;
        color: rgba(255, 250, 242, 0.84);
        font-size: 1rem;
        line-height: 1.55;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #ffd1a8;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      input,
      button {
        min-height: 48px;
        border-radius: 8px;
        font: inherit;
      }
      input {
        flex: 1;
        min-width: 0;
        border: 1px solid rgba(255, 250, 242, 0.22);
        padding: 0 14px;
        color: var(--paper);
        background: rgba(255, 250, 242, 0.08);
      }
      button {
        border: 0;
        padding: 0 16px;
        color: var(--night);
        background: var(--paper);
        font-weight: 850;
        cursor: pointer;
      }
      .status {
        min-height: 24px;
        margin-top: 14px;
        color: rgba(255, 250, 242, 0.8);
        font-size: 0.94rem;
      }
      @media (max-width: 520px) {
        .row { display: grid; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">A + N</div>
      <h1>Weekend details are locked.</h1>
      <p>Use the private share link, or enter the passcode from Aditya and Niharika.</p>
      <form id="unlockForm">
        <label for="secret">Passcode</label>
        <div class="row">
          <input id="secret" name="secret" type="password" autocomplete="current-password" />
          <button type="submit">Unlock</button>
        </div>
      </form>
      <div class="status" id="status" role="status" aria-live="polite">Checking link...</div>
    </main>

      const statusEl = document.querySelector("#status");
      const form = document.querySelector("#unlockForm");
      const input = document.querySelector("#secret");
      const storageKey = "an-bach-weekend-key";

      function b64ToBytes(value) {
        const binary = atob(value);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }

      async function deriveKey(secret) {
        const baseKey = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(secret),
          "PBKDF2",
          false,
          ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: b64ToBytes(encryptedPayload.salt),
            iterations: encryptedPayload.iterations,
            hash: "SHA-256",
          },
          baseKey,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );
      }

      async function unlock(secret) {
        if (!secret) throw new Error("missing secret");
        statusEl.textContent = "Unlocking...";
        const key = await deriveKey(secret);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(encryptedPayload.nonce) },
          key,
          b64ToBytes(encryptedPayload.ciphertext)
        );
        sessionStorage.setItem(storageKey, secret);
        const encodedSecret = encodeURIComponent(secret);
        if (location.hash.slice(1) !== encodedSecret) {
          history.replaceState(null, "", "#" + encodedSecret);
        }
        document.open();
        document.write(new TextDecoder().decode(plain));
        document.close();
      }

      const hashSecret = decodeURIComponent(location.hash.slice(1) || "");
      const savedSecret = sessionStorage.getItem(storageKey) || "";
      const initialSecret = hashSecret || savedSecret;

      if (initialSecret) {
        input.value = initialSecret;
        unlock(initialSecret).catch(() => {
          statusEl.textContent = "That passcode did not work. Please check the private link or enter the passcode.";
          input.value = "";
          input.focus();
        });
      } else {
        statusEl.textContent = "Paste the passcode to unlock the weekend page.";
        input.focus();
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        unlock(input.value.trim()).catch(() => {
          statusEl.textContent = "That passcode did not work. Try again.";
          input.select();
        });
